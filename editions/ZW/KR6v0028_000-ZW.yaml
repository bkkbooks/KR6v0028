front:
  text: 諦義證得經古印度烏瑪斯伐蒂著方廣錩譯註題解諦義證得經又名真理證得經入諦義論等印度耆那教經典該經的梵文原名為意為原理真理漢譯佛經傳統譯為諦真實義該經所謂的諦指耆那教主張的七個基本原理七諦意為義即意義意思意為得到知道學習漢譯佛經傳統譯為證得所證入該文原題最初無經字但傳統常在其後附上一詞故在此譯作諦義證得經諦義證得經的作者是著名的耆那教哲學家烏瑪斯伐蒂烏瑪斯伐蒂的生卒年不詳耆那教空衣派認為他活動於公元年至年白衣派認為他活動於公元八九世紀兩者差距很大學術界則一般傾向於認為他生活於五世紀烏瑪斯伐蒂出生於北印度尼耶戈羅迭伽父名斯伐蒂母名婆特希一說名烏瑪歲時依瞿沙難提剎瑪那出家加入耆那教團白衣派認為他的導師為牟拉空衣派認為他的導師是耆那教當時的教團長耿達宮陀出家後厲修苦行歲時接任耆那教教團長此後領導耆那教教團達年歲時逝世關於他的生平白衣派空衣派的傳說很不一致據說他一生著作甚豐共有部但現尚傳世的僅五部其中以諦義證得經以及他為這部經典所作的註釋最為重要諦義證得經共十章詳細論述了耆那教的基本理論七諦說並以此為綱把耆那教的主要學說大部分都組織進來了七諦指命非命漏縛遮滅解脫等七個基本原理耆那教認為世界萬象由命精神與非命物質兩大元素組成命分兩種一種不受物質的束縛已經得到了解脫一種受物質的束縛遍存於地水火風等四大及各種動物植物中非命也分兩種有定形的與無定形的有定形的物質由永恆而不可分割的極微原子與極微的復合體組成由於極微與極微的復合體具有種種性狀從而組成紛繁複雜的現實世界無定形物質包括時間空間法活動的條件與非法靜止的條件它們是命與有定形物質的活動條件與依據該經認為業是一種特殊的細微不可見的物質它可以漏洩在潛藏在人肉體中的命上這種作用稱為漏由於業有各種不同的種類所以漏洩在命上的業可以束縛命並決定該人的壽夭窮通與生死輪迴這種作用稱為縛因此為了得到解脫首先必須防止業進一步漏洩到命上這就需要用各種方式把命保護起來以免業接觸命這稱為遮進而則必須採用各種方法把已經漏洩到命上的業消除掉這稱為滅圓滿做到遮與滅就可以得到最後的解脫為了得到最後的解脫耆那教要求教徒必須具足正見正智正行等三項條件這稱為三寶即必須堅定對耆那教理論的信仰採用之指導自己的行動耆那教還要求人們必須遵守戒律從事苦行禁欲等修持認為由此可以讓命最終擺脫受物質束縛的狀態抵達不受物質束縛的解脫境地此外諦義證得經中還論述了耆那教的知識論宇宙觀等諸方面的內容由於歷史的原因耆那教於公元前三世紀左右分裂為白衣派空衣派等兩派沿襲至今現兩派據為理論依據的經典互不相同但唯有這部諦義證得經為兩派共同尊奉認為它所論述的確為正統的耆那教教義在耆那教中不少人以這部經典作為判斷是非乃至判斷其他經典真偽的標準甚至認為將該經讀頌一遍就有莫大的功德因此現代的耆那教研究者都把這部經典當作研究耆那教的基本資料當作闡述耆那教思想的原始資料耆那教與佛教產生於同一時代同一地區兩個宗教的信徒的社會層面亦大致相同因此佛教的思想與耆那教的思想有許多相近之處這祇要認真閱讀本經就可以明白佛教把耆那教當作六師外道之一經常在經典中提到它因此學習一些耆那教經典對我們深入學習與研究佛教的理論有極大的補益譯者認為從某種意義上說不瞭解佛教的源印度佛教就不能很好地了解它的流中國佛教而與印度佛教有密切關係的耆那教典籍是我們了解與研究印度佛教必不可少的資料該經現有英德日等多種文字的譯本本文是該經的第一個漢文譯本漢譯本先由譯者依據附有梵文原文的日本金倉圓照的日譯本翻譯進而約請葛維鈞同志依據梵文原文作了校對現將梵文原文用括弧抄錄在每節經文正文之後以供有興趣的讀者研究與查考梵文原文中的為分詞號為移行號本經原文非常簡略以致難以畢讀為了便於理解譯者在經文中適當增加一些文字凡屬譯者增加的文字一律用括弧標示另外為了便於閱讀與研究譯者參照日譯本及其他耆那教資料酌量作了一些必要的註釋現在耆那教白衣空衣兩派各有自己的諦義證得經的傳承本兩種刊本的內容基本相同略有差異日譯本依據白衣派的刊本翻譯但將空衣派刊本與白衣派刊本的主要不同之處一一在註釋中予以說明漢譯本仿照日譯本的辦法處理主要依據白衣派刊本翻譯採用小四號楷體印刷將空衣派刊本的不同內容放在相關的註釋中用五號楷體印刷採用括弧將空衣派刊本的節號括註起來以示區別我國古代大藏經除了收入佛教典籍外還收入古印度外道勝論派數論派的典籍如勝宗十句義論金七十論等賡續這一傳統我們把這部耆那教的基本典籍諦義證得經收入藏外佛教文獻供讀者研究參考正文
