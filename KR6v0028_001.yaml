羅都由無數物質微粒原子構成同時這四者的集合又構成了非命故稱為非命的身身在此有集合聚集的意思也有人把它譯作聚集這些與命都是實體注釋命非命是耆那教總括世界的兩個基本範疇一個是精神性的原理一個是物質性的原理由於非命可分作法等四個實體加上實體命故有些注釋者把命法非法虛空補特伽羅合稱為耆那教的五個基本實體空衣派刊本把本節分作兩節是常住的無色的注釋常住是與變化無常相對的一個概念指永恆不變色在印度哲學中常用來指物質但在這兒是指像物質一樣有看得見的形體有質礙故無色就是沒有一定的形體也無質礙但補特伽羅是有色的注釋本節意為補特伽羅有質礙有一定的形體兩節是對五個實體基本性質的簡述這五個實體都是永恆不變的其中命是精神性的法非法虛空補特伽羅是物質性的在這四個物質性實體中法非法虛空是無質礙色的不定形物質而補特伽羅則是有質礙色的定形物質精神性的命也是無質礙色的圖示如下直至虛空為單一的實體注釋本節意為法非法虛空三個實體是單一的即它們各自都是一個整體不可分割而補特伽羅與命則是由數量無限的個體組成的且無作注釋無作即不活動不造作本節意為法非法虛空雖然可以幫助阻止或容納物體活動但它們本身都是消極的不活動的反之補特伽羅命則是積極的活動的法非法的微點是無數的注釋微點耆那教專用術語指一個原子所能占據的空間耆那教認為法非法雖是單一的不可分割的物質性實體但由於它是無色的即沒有質礙的且在它內部有無數個小空間微點故此可以讓物質原子來占據命的微點也是無數的注釋命中也同樣有無數個微點空衣派刊本把與合為一節作為法非法命的微點是無數的故從下一節起兩種刊本的編號一致參見的注釋虛空的是無限的注釋本節意為虛空中也有無數個微點且虛空中的每一個微點也是無限的補特伽羅的微點分成能計量的不能計量的和無限的三種注釋本節原文祇有能計量的不能計量的兩種但據作者原注還應有第三種無限的微點原子沒有微點注釋原子舊譯微塵極微物質不可分割的最小單位由於它自己祇有一個微點大祇占據一個微點的空間因此原子內部也就不可能再被分出微點存在於世界空中注釋世界空是耆那教哲學特有的概念與非世界空相對所謂非世界空指絶對空世界空則指我們所在的宇宙耆那教認為前述五個基本實體僅存在於世界空中即我們所在的宇宙中不存在於非世界空中即法非法的是全部世界空注釋本節意為法非法存在於全部世界空中亦即整個宇宙中都存在著法與非法兩實體補特伽羅的份存在於一微點等中注釋份指被分割後的補特伽羅的某一部分本節意為補特伽羅被分割以後可以以一個個原子單獨分立的形式獨立存在即由一個個的原子占據虛空中的一個個微點乃至占據整個世界空但它也可以以兩個原子三個原子相結合的復合體形式存在占據二個微點三個微點的空間命的份存在於世界空的無限的部分等中注釋耆那教認為世界空就其總體來説是有限的但就其每一部分來説是無限的每一個無限的部分又可以分成許多無限的部分即無限可以無限地分割本節意為如一個命占據這個一個無限其它的命還可以占據這個無限之外的其它無限關於這一點可結合下節所説的命有伸縮自如的特徵來理解就像燈光一樣可憑借收集或放射其微點的方式占據空間注釋本節意為命可以憑借收集或放射其微點的方式占據它所占有的空間包括身體的每一個部分猶如一盞燈無論房間是大是小都可以用自己的燈光布滿該房間耆那教認為正因為命有與燈同樣的特徵所以各種不同的肉體雖然都祇有一個命但這個命卻能統率該肉體的任何一個部位在空衣派的刊本中本節之寫作但意義相同法與非法的功能提供了進行或停止的必要條件注釋本節意為命與補特伽羅的任何活動或停止活動均需有法或非法的協助虛空的功能在於提供場所補特伽羅的功能在於構成身語意呼吸注釋本節指出補特伽羅不僅能構成人的肉體還能構成一般被認為是生命現象的語言思維呼吸也就是説耆那教認為語言思維呼吸等實質上都是物質性的與精神性的命的本質截然不同這一點值得引起重視佛教的説法與此類似這對於我們理解佛教無我論的真實含義有重大意義耆那教的上述觀點與他們的業的理論有關耆那教認為上述生命現象都是業活動的結果而業從本質上説是一種細微的物質故生命現象從本質上説也都脫離不了物質性佛教強調五陰之受想行識四陰與色陰是一個整體不可分割並均蒙有色陰物質性的苦空無常的特性其思維方式與耆那教基本相同且是苦樂生死的必要條件注釋本節意為補特伽羅是人們感受苦樂經驗生死的必要條件命的功能在於它們互為必要條件注釋耆那教認為命並非單一的整體它在數量上是無限的命與命必須互相依賴方可生存故説互為必要條件作者原注説因善惡的教示命互為必要條件時間的功能存在於延續轉變所作及長短等之中注釋耆那教的理論家們對時間的解釋不太一樣空衣派認為時間也是一種實體參見白衣派未作肯定但也未作否定本節意為時間的功能體現在萬物的存在變化運動即所作之中並體現在對時間長短的度量中關於轉變請參見至補特伽羅具有觸味香色注釋本節意為補特伽羅具有觸味香色等特性因而是身舌鼻眼的認識對象並具有聲結合細微粗大形狀可分暗影熱光注釋本節進一步闡述補特伽羅所具有的各種特性聲結合指能結合性細微指具有細微的狀態粗大指具有粗大的狀態形狀指具有一定的形狀可分指具有可分性暗影熱光在補特伽羅中有原子和原子的復合體注釋復合體由原子結合而成的原子團由結合分割而産生注釋據作者原注所謂結合分割意為結合分割又結合又分割這麼三種方式故本節意為復合體通過如下三種途徑而産生一由原子結合産生粗大的原子的復合體二分割物體而形成細微的原子復合體三在結合分割的共同作用下産生新的原子的復合體原子由分割而産生注釋本節意為原子祇能由分割其它物體或復合體而産生但不能通過結合而産生亦即原子本身是不可分割的最小微粒由分割或集合而成為可見的注釋在這裡分割或集合是復合體的代名詞因為復合體是通過這些方式産生的耆那教認為原子太小是不可見的但復合體在一定條件下是可見的所謂有就是具有産生消滅延續結合四種特徵注釋空衣派刊本與此略有不同為實體的特徵為有然後將白衣派刊本的作為這樣空衣派刊本就多了一節據作者原注作者在之前有這麼一段話如何來認識法等的存在呢答可由特徵來認識那麼存在即有的特徵是什麼呢下面即接本節由此看來空衣派刊本在本節前加了之後則似乎文章前後脈絡更順理些如有的狀態不消滅即把它作為常住那是因為可以明顯看到它有主要的方面及非那個方面的緣故注釋在中對有下的定義是産生消滅延續結合即是一種動態的變化而對有的定義又認為它是常住即永恆不變如何理解這一矛盾的表述呢回答了這一問題耆那教認為任何物體都有基本的方面即主要的方面及派生的方面即非那個方面如果我們從它的主要方面看那麼它是常住的但如果我們從它的派生方面看它又是變化的因此與兩種對有的定義相互並不矛盾可以同時並存耆那教從來主張任何事物都是相對的常住並非絶對的常住變化亦非絶對的變化祇是看問題的角度不同而已耆那教這種觀察事物的方法稱為或然論原子的結合根據粘著性與乾燥性注釋自本節至論述原子的結合問題耆那教認為原子結合為復合體復合體結合為物體但這種結合並非單純的混合而必須有性質上或數量上的差異為依據本節講性質的差異即相互結合的原子必須有不同的性質如粘著性原子與乾燥性原子的結合具有最低量這種性質的原子不結合注釋耆那教認為每個原子都帶有一定程度的性質或乾燥性或粘著性某原子團中該種性質的原子愈多該原子團這種性質的強度就愈大因此所謂原子具有最低量這種性質也就是祇有單個原子雙方如係都祇具有最低量這種性質也就是説雙方都是單個原子在這種情況下性質既相同數量又相等雙方沒有差異因此不能結合同種性質程度也相等時原子不結合注釋論述的是性質相同的單個原子能否結合的問題本節論述性質相同的復合體能否結合的問題如果兩個復合體具有同樣的性質該種性質的強弱程度也相同亦即如果它們由同一種性質的原子組成則各自內含的該種性質的原子個數相等如果它們由不同性質的原子組成則這些不同性質的原子相互抵消後所剩餘原子的性質與個數都相等此時這兩個復合體並無差異因此仍不能結合但是可與性質比它多二及二以上的復合體相結合注釋本節論述兩個性質相同的復合體在什麼情況下可以結合耆那教認為如果兩個性質相同的復合體所內含的使它們能夠顯示出相同性質的原子個數之差大於時這兩個復合體才能結合用字母來表示如用代表帶粘著性的原子用代表該復合體表現為祇有或多餘個或帶粘著性原子則祇能與等復合體結合同理如用代表帶乾燥性的原子用代表該復合體表現為祇有或多餘個帶乾燥性原子則祇能與等復合體結合某些注釋者認為在與之間也必須按這一規律結合結合時有相等的轉化和趨向增高的轉化兩種注釋據作者原注性質強弱不同的兩個復合體結合後會出現兩種情況一種是雙方轉化得強弱程度相等另一種是程度低的一種向程度高的一種轉化但空衣派刊本無有相等的轉化一語僅作結合時向程度高的一方轉化實體有性質與樣態注釋性質舊譯為德參見樣態原意為差別據作者原注這兒指樣態的變化與名稱的變化故譯作樣態有些人認為時間也是實體注釋這兒的有些人指的是空衣派參見空衣派刊本此節為時間亦然它由無數個瞬間組成注釋它指時間性質依存於實體其本身沒有任何性質注釋本節意為性質反映事物實體的屬性它與實體不可分但性質本身不能成為其它某些性質的基體或附著體此節與勝論經的前半節完全相同而其狀態處在轉化之中注釋原注説此節意為實體及性質的狀態就是轉化一詞在本經中多次出現意為事物的現實狀態事物外在的現狀空衣派刊本本章到此結束白衣派刊本尚有以下三節轉化有無始有有始於有色者為有始注釋有色者即有形體者這一類事物包括生物有具體的形體因此都有産生發展滅亡的過程有始有終而無色者即無形體者如法非法虛空等是無始無終的於命之作為及意向性的轉化為有始注釋意向性參見作為參見等節第六章作為是身語意的業注釋作為梵文原文為即瑜伽在印度哲學宗教中它常指印度特有的一種修煉法但在這裡則是耆那教特有的術語指命使身語意行動起來使外部的物質作為業流入內部這麼一種作用故在此譯為