寫作補贖端肅服務學習放棄靜慮為後者注釋端肅原文為漢譯為毗奈耶即律但這兒是指禮儀等故譯為端肅詳見後者指內在的苦行本節論述內在的苦行包括哪些內容對於每一項的解釋見至其中靜慮以前的各項順次有九四十五二的小區分注釋所謂靜慮以前指從補贖到放棄等五項本節意為補贖可分為九端肅可分為四服務可分為十學習可分為五放棄可分為二關於靜慮的區分可見在空衣派的刊本中寫作告白改悔同時進行此兩者離棄一切愛用放棄對身體的愛著苦行削減法臘別住恢復僧籍等九種即為補贖的小區別注釋本節具體論述所講的九種補贖告白自我檢舉承認錯誤離棄據原注是指放棄飲食的炊具等物但一般解釋為放棄內外一切事物放棄與離棄意思差不多有的解釋者認為這是專指放棄對身體本身的愛著法臘指出家的年數別住指為了贖罪而不與僧團的其它僧人居住在一起一個人單獨住智見行關於禮節的端正態度等四項即為端肅的小區分注釋端肅梵文原詞為與佛教的戒律毗奈耶本是同一詞但耆那教的端肅與佛教的戒律的意義有所不同而大體相當於正治佛教有時也將譯為正治意為以端莊嚴肅的態度去對待正智正見及師長故在此譯作端肅從根本意義上説端肅正治律三個詞是共通的關於禮節的端正態度指會見具有正智正行正見三寶的師長時應具有的正確禮節本節論述所講的四種端肅服務的十種小區分為服務於阿闍黎和尚苦行者有學問的僧人病人團體部屬僧伽聖僧在家信徒注釋本節具體論述所講的十種服務在空衣派的刊本中寫作寫作學習的五種小區分為教授提問仔細思索暗誦説法注釋本節具體論述所講的五種學習在空衣派的刊本中寫作放棄的二種小區分為對外在物及內在物俱不關心注釋外在物指身外的一切包括財産家庭妻兒名譽地位內在物指身體本身及與穢濁有關的各種精神活動本節具體論述所講的二種放棄所謂靜慮是具有最高關節連繫者的思想的一種觀想與控制注釋關節連繫見它共分六種最高關節連繫指這六種中的最高位控制參見本節解釋所講的靜慮它的持續時間超過一個暫時注釋它指靜慮在空衣派刊本中本節作並將此節與上節合為一節作它有苦想凶想法想淨想注釋本節論述靜慮的分類這又稱為四想或四禪從至即分別解釋這四禪在空衣派的刊本中寫作此四禪中後二想是解脫的原因注釋法想淨想是解脫的原因反之苦想凶想是輪回的原因所謂苦想是當與不愛之對象結合時為了離棄它而專念不休注釋本節解釋什麼叫苦想本節的解釋與佛教八苦之怨憎會苦有些類似在空衣派的刊本中寫作且為了從痛苦中掙脫出來而進行專念也是苦想之一注釋痛苦原詞是與佛教的受是同一詞初期漢譯佛經即將該詞譯作痛這兒是指痛苦的感覺據耆那教後來的解釋本節主要是指從疾病的痛苦中掙脫出來從本節可知佛教的受最初的含義是感覺上的痛苦空衣派刊本將此節與下一節的順序顛倒對喜歡的對象的正好相反的態度也同樣注釋本節仍是論述什麼為苦想極力專念那些沒能到手的令人歡喜的對象也是一種苦想本節所述與佛教八苦之求不得苦有些類似總之耆那教要求人們不要試圖去擺脫已有的痛苦也不要試圖去爭取未得的幸福認為這一切非但徒勞而且將會成為人們墮入輪回的原因在空衣派的刊本中寫作對未來的欲念也是一種苦想注釋未來的欲念是一特殊的術語專指欲在來世實現的欲望如希望來世投生為國王之類並為了實現這一欲望而專念苦行這也是一種苦想以上四種苦想在住於無遠離位部分的遠離位放佚禁戒位者處産生注釋至分別論述了苦想的四種表現本節論述苦想産生在哪些人身上即正處在無遠離位等三個德位的人可能産生苦想關於無遠離位等德位參見關於十四德位的注解為了殺害虛偽偷盜守護對境而進行專念即是凶想它産生於無遠離位和部分遠離位注釋本節論述什麼叫凶想及它産生在哪些人身上對境原意指眼耳鼻舌身所認識對觀的對象這兒指一切身外之物守護對境即指貪戀財産家庭妻兒名譽地位等一切身外之物為了聖教損失異熟尋求形狀而進行專念即是法想它産生於不放佚禁戒位注釋本節論述什麼叫法想以及它産生在哪些人身上聖教這兒指耆那教損失指禪定靜觀如何除去邪見邪智邪行或指靜觀除去附著在命上的業從而使命的本相顯露與講的損失不同該詞在中意為判斷與本節不同異熟參見的注釋形狀指宇宙的構造尋求形狀即禪觀全宇宙的構造與講的形狀不同在空衣派的刊本中無産生於不放佚禁戒位一句且也産生於穢濁抑止位和滅盡位注釋本節論述的仍是法想産生在哪些人身上空衣派刊本無此節為了供研究者參考現將耆那教的十四德位具列如下一邪見位二有味正見位三正邪見位四無遠離正見位五部分的遠離正見位六放佚禁戒位七不放佚禁戒位八退轉粗穢濁位九不退轉粗穢濁位十細穢濁位十一抑制穢濁離貪偽位十二滅盡穢濁離貪偽位十三有作為獨存位十四無作為獨存位上述第八位也稱作本章中所説的無遠離位即第四位部分遠離位即第五位放佚禁戒位即第六位中説的不放佚禁戒位即第七位中講的粗穢濁位通常指第九位也有人認為它通指第八第九兩位講的細穢濁位指第十位提到的無穢濁位又可分成兩種即第十一位第十二位也即是中講的穢濁抑止位與穢濁滅盡位講的勝者位即第十三位下文講的獨存位則相當於第十三十四兩位也就是説諦義證得經講的這些德位相當於十四德位中的第四位至第十四位且淨想的最初兩種産生於穢濁抑止位與滅盡位注釋本節論述淨想按耆那教的理論淨想共分四種見本節的淨想的最初兩種即指所講四種淨想的前兩種各類尋求單一尋求這是逐漸深化的淨想四階段的前二個階段空衣派的刊本中本節為且淨想的最初兩種産生於知道前的人前即十四前是耆那教的早已亡逸無考的古經典參見的注釋白衣派刊本本節的注釋也提到十四前但正文則如本節所示沒有涉及這一問題其餘兩種産生於獨存位注釋其餘兩種指所講的四種淨想的後兩種即抑制細作停作不退獨存位見的注釋四種淨想是各類尋求單一尋求抑制細作停作不退注釋本節論述淨想的分類各類尋求指從各種樣態形式去禪觀經典上所講的種種對像單一尋求指繼續禪觀其中的一種抑制細作指努力抑制以細微狀態存在著的作為停作不退指完全擺脫一切業進行禪觀靜思另一種解釋認為各類尋求指禪觀對象的對立如物質精神的對立等與變化如生滅的變化等單一尋求指祇把與變化無關的命作為禪觀的對象在空衣派的刊本中本節最後的寫作這四種淨想依次産生於三和産生於一和産生於有身之作為者及産生於無身之作為者注釋三指具有身口意三種作為的人一指祇具有其中一種作為的人本節意為各類尋求産生於具有身口意三種作為的人單一尋求産生於祇具有身口意中某一種作為的人抑制細作産生於祇有身作為的人停作不退産生於任何作為都沒有的人在空衣派的刊本中本節作意義相同最初的二種淨想依止一而有尋注釋據作者原注所謂依止一指依止一事而一事則指聖典所説的事情有尋參見有尋空衣派刊本中寫作有尋有伺伺即伺察參見第二為無伺注釋白衣派刊本的注釋的最後説其中第一為有伺然後下接本節這樣兩節的完整意思就是前二種淨想都依止於聖典所講的事其中第一淨想有尋有伺第二淨想有尋無伺所謂有尋即聖典智所謂伺察即對義句與作為的推移注釋本節意為從聖典所説的某教義想到其它的教義從一個句想到其它語句從一個作為想到其它作為這樣一種禪觀方法即為伺察至論述四種淨想的前二種這二種淨想都有尋即都是以聖典智為基礎的但前一種淨想禪觀的方式是從一個對像推廣開來兼及其它這稱為有伺後一種淨想禪觀僅專注於一個對像而不斷加深這稱為無伺這二種淨想實際上是禪觀的二個階段耆那教的尋伺的概念與佛教的尋伺的概念內涵不同需加區別處於正見位聲聞位遠離位無終隨縛脫離位見癡壞盡位行癡抑止進行位行癡進行位行癡壞進行位行癡壞盡位勝者位者依次比處於前一位者消滅無數倍的業注釋關於無終隨縛可參見及注釋有些研究者認為上述十位可與十四德位相互搭配尼乾陀為榖皮者有斑者犯戒者離繫者沐浴者注釋尼乾陀即耆那教徒耆那教在此把耆那教徒分成五類榖皮者指雖未背棄耆那教的教義但未必能嚴守禁誓者有斑者指雖然能守禁誓但心中想藉此圖虛名者犯戒者分二種一種是被迫犯了某一禁誓者另一種指尚殘存情火穢濁的穢濁犯戒者離繫者指位於無穢濁離貪位者亦即十四德位的第十一十二位者沐浴者指處於有作為獨存位者可由禁戒聖典智服罪津渡相色彩生階位的不同來推斷這五種人的差別注釋服罪指被迫犯了五禁誓之一或犯了夜間不食等八戒之一而又能悔改認罪者津渡指是否能成為耆那教的祖師又稱津渡者即救世主一説指是否列身於耆那教祖師所創立的教團中相該詞原指生殖器引申為性別這裡則指該耆那教徒是僅重外儀還是內外相應色彩參見等節生指命終後是得到解脫還是生於天界在空衣派的刊本中該詞寫作與的化生位同一詞階位指遵守禁戒的程度不同第十章由滅盡愚癡且滅盡障覆妨礙正智與正見的業而有完全智注釋本章主要論述七諦的最後一諦解脫耆那教認為消滅了愚癡之後就可以達到離貪的德位再進而把障覆妨礙正智與正見的業全都消滅掉就可以得到完全智這也就是達到了解脫由於縛因的消除與業的滅就能滅盡所有的業而得到解脫注釋空衣派的刊本把上述兩節合為一節作由於縛因的消除與滅並從所有的業脫離可得解脫業的抑止等各種狀態及關於解脫的可能性均消失因而有解脫但是屬於完全智的正行智見與完全性除外注釋所謂業的抑止等各種狀態指所講的命的五種狀態耆那教認為解脫時這五種狀態都消失不復存在所謂可能性即所講的可能性耆那教認為那種可能性是在解脫前講的既然已經解脫也就無所謂什麼可能性由於解脫就是獲得完全智因此屬於完全智固有屬性的正行正智正見及完全性四項是不會消滅永遠存在的完全性在這裡有圓滿的意思空衣派刊本把此節的但是以下的文字獨立為一節把此節分為兩節如果滅盡所有的業得到解脫則解脫者不停頓地直接上升而達世界之終極之所由以前的加行由無著由斷縛由如去的轉變性而有這種上升的運動注釋所謂以前的加行指命解脫前運動的餘力或慣性所謂如去的轉變性指命本來具有的上升性質關於轉變可參見空衣派刊本無一句並在本節之下另有二節正如轉動著的陶工輪子自己還要轉動那樣正如除去污穢的葫蘆浮到水面那樣正如脫去殼的萆麻種子向上發芽那樣且正如火焰上升那樣這四個比喻正是解釋加行無著斷縛如去的轉變性的如果不那樣上升到世界的終極是由於缺乏法的聚集法為運動的條件本節意為一般來説解脫者自然能夠上升到世界的終極但如果缺乏運動的條件則也可能無法上升在白衣派刊本中此節被作為注釋應由場所時間趣相津渡行獨覺覺證智身量間隔數之多少來推斷解脫的命注釋耆那教認為解脫由本節所述的十一個因素決定因此可把這十一個因素作為觀察法參見來觀察解脫場所指解脫的地點時間指解脫的時間趣指原來生存在哪一趣相指性別即講的三相津渡指是否作為耆那教祖師而解脫行指成為解脫原因的那些行動獨覺覺證指到底是憑自己的力量達到解脫還是靠他人力量而覺悟的智指依憑哪一種智而得到完全智身量指解脫時的身體姿態及身高間隔與前一個解脫者所間隔的時間數的多少指此時命的多少關於數可參見
