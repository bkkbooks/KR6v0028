body:
  text: 第一章正見智行就是解脫道注釋見是印度宗教哲學的常用術語意為觀點認識它又分為普通人對事物的一般認識和宗教哲學家對世界人生的特定學説如本經所講的見的覆障是指普通人的一般認識而正見則是指特定的宗教哲學理論由於學説不同印度各宗教哲學派別都把本派的觀點奉為正見而把別派的觀點斥為邪見並把信奉本派學説作為能夠得到解脫的首要條件如佛教即將正見列為八正道之首耆那教所謂的正見是指對耆那教七諦理論的信仰見關於正見的違背見智同樣也分世俗的一般智慧與宗教的最高智慧等兩種這兒指宗教哲學家主張的智慧故也有人譯作正智關於耆那教的正智參見至行行動行為與見智一樣也可分為世俗的與宗教的兩種這兒指符合耆那教宗教規範的正行參見正見正智正行三者被耆那教稱為三寶他們認為祇有按這三寶的要求去做才能得到解脫所以有的研究者認為本節也可以譯作應由正見正智正行而得解脫之道但是原作者之所以沒有在本節的智與行前也冠以正字是為了特別強調本經所論述的七諦學説是耆那教教義的精華因為七諦學説在耆那教理論體系中屬於正見的範疇耆那教認為觀點指導行動因此最主要的是樹立正見有了正見自然會産生相應的正智與正行正見即對諦義的信仰注釋本節至解釋什麼是正見與論述怎樣才能得到正見諦義即本經的論述對象亦即講的七諦是耆那教的理論基礎所以耆那教認為祇有對七諦的信仰才可以稱為正見它可自然而然或由證得而産生注釋它指正見本節論述産生正見的兩種途徑耆那教認為有的人由於前生的功德一生下來就具備這種正見這就是所謂的自然而然地産生而一般的人祇能通過學習亦即通過證得來樹立這種正見要學習必須有人教授因此也有人把此節譯為它可自然而然或由教授而産生諦義證得經就是為了這種學習或教授而編纂的佛教有根本智後得智的説法與耆那教的這種觀點大體類似諦即命非命漏縛遮滅解脫注釋本節敘述正見的綱目亦即諦義證得經論述的中心七諦命梵文原文為在我國古代漢譯佛經中一般譯為命近代以來也有不少人譯為靈魂但耆那教的命與現代意義的靈魂尚有差異耆那教的命是一種純粹精神是世界的基本原理是萬物含靈的依據是耆那教哲學的基本範疇之一為了避免與人們通常理解的靈魂相混淆在此仍譯為命耆那教對命有一系列詳盡的論述參見第二章至第四章非命是與命相對的一種基本原理也是耆那教哲學的基本範疇它大體相當於物質和物質存在的條件詳見第五章漏是耆那教基本概念也是佛教常用的術語在佛教中它指漏泄的煩惱但在耆那教中漏指業漏泄纏縛命詳見第六章縛是束縛的意思指命被業束縛詳見第八章遮是阻擋的意思指阻擋住業不讓它漏泄到命上詳見第九章滅是消滅的意思指消滅已漏泄到命上的業詳見第九章解脫即從業的束縛中最終解脫出來印度各宗教哲學派別都把解脫當作自己的最高理想但對解脫的解釋各不相同關於耆那教的解脫觀詳見第十章上述七諦是耆那教的根本理論另外有的耆那教經典祇講命非命兩諦而把漏縛遮滅解脫都歸入非命中也有的經典則將七諦理論中遮滅兩諦所包含的善惡單列出來形成九諦有些研究者認為上述二諦九諦的學説反映了耆那教諦義理論的不同發展階段這種説法可供參考按名稱形態實體狀態而決定注釋本節意為每一個諦可以表現為或被規定為名稱形態實體狀態等四個方面因此我們可以通過上述四個方面去認識每一個諦例如命的名稱叫它表現為生命形態它具有脫離物質束縛的永恆不變的實體在不同的情況下它呈現為不同的狀態實體又可譯作缺性的狀態指排除了各種屬性之後的狀態也就是説耆那教認為祇有在排除一事物與其他一切事物的所有聯係之後才能真正把握該事物的實體這與印度奧義書中講梵佛教中觀派講空時所用的方法有相近之處由量及觀察法而證得注釋本節論述證得學習諦義的方法即可以通過量及觀察法這二種方法來證得量是印度哲學特別是印度邏輯學因明的常用術語指知識來源認識方法及判斷知識真偽的標準耆那教對量的解釋見觀察法指認識事物的方法見且通過對定義所屬形成的原因關係存續區分及存在數量場所接觸時間間隔狀態大小的考察而證得注釋這兩節意為應按提出的那兩種方法來觀察這兩節提出的這十四個範疇才能證得諦義推而廣之也可用這種方法考察一切事物得到對事物的正確認識耆那教認為上述十四個範疇中提到的六個範疇是最基本的以觀察漏為例就必須把握定義即怎樣給它下定義所屬它從屬於什麼形成的原因因何而生關係與周圍事物的相互關係存續存在於哪一段時間內區分怎麼分類而所講的八個範疇則是根據不同對像不同情況分別提出的即所謂應機而設所以後八個範疇的內容與前六個範疇有所重復如果以所提的八個範疇來觀察正見則可知存在正見祇存在於部分衆生中不存在於非衆生中數量它是無數的場所世界各處它無所不在接觸面它與世界的無數部分相接觸時間它存在於命的某些特定時間中間隔它的存在有一定的間隔即有時它並不存在狀態它祇存在於命的一定狀態時大小它有時微弱有時強大智慧有感官智聖典智直觀智他心智完全智注釋本節論述智慧的分類以下直至都是對智慧的論述感官智指感覺器官及意識所進行的認識活動及這種活動所得到的知識亦即一般人通常的認識活動及認識它包括感覺推理記憶等參見聖典智指學習聖典與宗教導師的教導的整個學習過程及由此得到的知識它包括注意理解聯想等等參見直觀智相當於佛教中所説的天眼通據説雖然這種認識有時還需借助於感官與意識即感官智但它具有超越時空的神祕力量可以直接得到在時間空間方面都很遙遠的事物的認識參見至他心智即佛教中所説的他心通據説具備這種認識能力的人可以直接洞察他人過去現在未來的種種心理活動耆那教認為祇有當認識者擺脫一切個人的忿憎等感情才能具有這種神祕的本領參見在空衣派的刊本中他心智的梵文原詞為完全智即佛教中所説的大圓鏡智據説這是在認識者的命已經擺脫了業的束縛以後獲得的一種最完善最全面的認識它不需任何外界的幫助不依賴意識與感官也不受時間空間的限制是一種至高無上的智慧參見這分作兩種量前兩種是間接的其它是直接的注釋耆那教按照是否需要媒介工具把感官智等五種智分成直接智慧和間接智慧兩種所謂直接智慧係指一個已經擺脫了業的影響並具有正確認識能力的勝者天生就有或其它人不憑任何媒介工具自然就能夠得到的智慧而間接智慧則是普通人借助於某些媒介工具才能得到的他們認為感官智要依靠感官意識光線等各種條件才能産生聖典智要依靠聖典及教授等媒介才能産生故都屬間接智慧所以稱前兩種是間接的而直觀智他心智完全智都是命本身在一定狀態下自發得到或天生就有的故都屬直接智慧所以稱其它是直接的應該注意的是印度其它宗教哲學派別一般都將感官智當作現量即當作可靠的直接智慧而耆那教卻把它當作間接智慧剛好相反耆那教貶斥感官智是為它要求人們閉目塞聽反觀自證的宗教修持目的服務的感官智念想思覺知等都是同義詞注釋本節實際上是給感官智下定義意為感官智包括念想思覺知等諸方面古印度正理派經典正理經的內容與本節相似可以參見這感官智以根及非根為原因注釋本節論述感官智依靠什麼而産生根印度哲學術語指人體器官分為知根感覺器官與作根行動器官兩種這兒指感覺器官即眼耳鼻舌身又稱五根見非根指意識佛教認為意識也有根常與眼等五根合稱六根耆那教認為意識不屬根故稱非根但耆那教與佛教一樣認為感官智必須依靠外在的五根與內在的意識才能産生漠然的感覺認識的欲望判斷及記憶是感官智形成的步驟注釋這一節論述感官智依照怎樣的認識過程形成以對一面旗的認識為例首先是被動地感覺到有那麼一個紅色的東西這就是所謂漠然的感覺隨即産生一個想明瞭它到底是什麼東西的願望即認識的欲望接著根據它飄動的情況斷定它是一面旗這為判斷然後又確定它與過去自己曾見過的旗是同樣的旗這是記憶這裡講的是一個認識形成的四個步驟耆那教認為這也是感官智的四種功能可認識多數多種迅速不顯現非言詮恆常及其反面注釋本節論述感官智的認識對象即它可以認識多數多種迅速不顯現非言詮恆常等六種範疇及與上述六種範疇相反的少數少種緩慢顯現言詮變化等六種範疇也就是説感官智可以認識事物的數量事物的種類事物的速度可以認識明顯的或隱藏的事物可以認識能用語言來表達或不能用語言來表達的事物可以認識永恆不變或變化無常的事物這是就明確的對像而言對於不明確的對象祇有感覺與之相關但此時要除去眼根與非根注釋至雖然論述了感官智憑籍什麼而産生它的四種機能及認識對象但耆那教認為上述這些都是對明確的對象而談的而對於那些不太確定的對象如遠處傳來的模模糊糊的聲音則祇有漠然的感覺這一種機能在起作用並且由於眼識與非根即意識永遠祇在認識明確的對象時起作用而在認識那些不太確定的對象時不起作用故此時要除去眼識與非根聖典智在感官智之後可分為兩類多數及十二種注釋本節論述聖典智耆那教認為聖典智必須依感官智為基礎通過感官智得到故稱在感官智之後聖典智分為兩類肢及肢外肢指耆那教的基本經典十二肢肢外指十二肢以外的其它經典肢外的經典很多故稱多數肢祇有十二部故稱十二直觀智有兩種對於住在地獄者及諸天它是與生俱有的對於其它它由上述原因而生但此時它又分成六種注釋這三節論述直觀智耆那教把一切衆生分成四類天與佛教之天完全相同人傍生即畜生地獄住者即鬼見故所謂的其它指人及傍生所謂上述原因據作者原注是指抑止及滅盡産生智障的業關於抑止滅盡業的問題請參見第九章第十章這三節意為直觀智可分為兩種對於天及鬼來講它是生與俱來先天就有的對於人類及畜生來説它是在抑止滅盡了産生智障的業之後産生的而人類與畜生所具有的後一種直觀智又可以因場所的變更而分為六種不同的情況它們是因場所的變更而消滅者不消滅者逐漸減少者逐漸增大者又減少又增大者不變者空衣派的刊本將與兩節合為一節作住地獄者及諸天的直觀智是與生俱有的他心智分單純直覺和廣泛直覺注釋本節及下一節論述他心智單純直覺指立刻能直接覺知他人心中現在正在想什麼的他心通功能廣泛直覺指連別人心中的復雜思維即過去曾有過的未來將會有的思維都能察知的他心通功能其差別則根據清淨及不壞注釋耆那教認為廣泛直覺比單純直覺更高一等即它比較清淨且具有永久性一旦得到後再不會喪失所以稱為不壞根據清靜範圍所有者對境的不同來區別直觀智和他心智注釋本節論述直觀智與他心智的差別耆那教認為他心智比直觀智更加清靜作用範圍更大一切衆生都可能有直觀智但祇有聖者才能具備他心智即所有者不同直觀智的對象是粗大的物質世界而他心智的對象是精微的精神世界即對境不同與感官智及聖典智相關的對境在於一切實體而不在於一切樣態注釋本節意為感官智及聖典智可以認識一切實體但它們未必能認識一切樣態在空衣派刊本中本節缺一切實體之一切一詞而與直觀智相關的對境在於諸色之中注釋色一般指物質性的具體事物與名精神性本原相對是印度哲學的重要範疇本節意為直觀智雖然可以超越時空去認識事物但它所認識的對象仍然是具體的物質性的事物與他心智相關的對境還在於它的無限部分注釋它指直觀智認識的對象據作者原注本節意為他心智能夠認識直觀智所能認識的一切對象不僅如此它還能認識人的一切思維另一種解釋説無限部分是指該認識對象的細微的形式與完全智相關的對境在於一切實體及樣態注釋本節論述完全智的認識對象由於完全智最圓滿最完善所以它以一切實體一切樣態作為自己的認識對象關於完全智還可參見第十章關於解脫者的論述在一命中同時有從一智到四智的區分注釋前面至論述了五種智的認識對象本節論述五種智以怎樣的方式存在於某一生命體中耆那教認為這五種智不能同時存在於某一個生命體中每個生命體可以祇有一種智此時為完全智可以同時有兩種智此時為感官智與聖典智可以同時有三種智此時為感官智聖典智與直觀智或感官智聖典智與他心智可以同時有四種智即除了完全智之外的其它四種智雖然幾種智可以同時並存在一個生命體中但在某一特定時刻祇能由一種智活動此外耆那教認為除了完全智外其它四種智都不是常恆永存的感官智聖典智直觀智還有顛倒這種顛倒因把有與非有等同視之或象狂人那樣自恣感受而産生注釋顛倒指謬誤就如把馬顛倒認識為牛那樣這二節意為感官智等三種智慧並非永遠正確在不正常的情況下也會産生謬誤産生謬誤的原因在於不能正確區別世界上諸種事物的存在有與不存在非有把它們等同起來了或象精神病患者那樣不能正常地認識看待世界觀察法有無差別觀共性觀個性觀現狀觀習慣義觀等五種注釋本節與下節解釋中提到的觀察法無差別觀作者在原注中解釋説當我們講瓶時我們是指按照作瓶者的意圖而作出的上部為環狀口長頸圓下部成球狀有運水蓄水作用的被燒製成種種色彩的那麼一種特殊的實體而毫無差別地看待這一個特殊體即某一個特定的瓶或所有這一切種類即所有的瓶即是亦即無差別地等觀個別與一般或從個別事物中攝取它與其它事物的共性而拋棄其個性的觀察法共性觀作者在原注中説指由名稱等而突出出來的關於現在過去將來的瓶子的一般性理解即不看個性祇看共性的觀察法至於無差別觀與共性觀的區別有的研究者認為前者是指從個別到一般的動態觀察法後者是對共性一般的靜態觀察法有的研究者認為前者是從空間來講的後者是從時間來講的個性觀即注重考察事物個性的觀察法現狀觀作者在原注中説指善於對現在存在的對象作正面的解釋又説如掌握現狀觀則應能簡單知道對現在的對境的把握故現狀觀係指對現存事物現狀的觀察及表述習慣義觀作者在原注中説指反映了名稱中的既定觀念的詞彙與它的內容間的表象研究者認為所謂習慣義觀是從語言方面來講的指觀察人們賦於某一詞彙的習慣含義並了解以一些同義詞來表述一定的事物在空衣派的刊本中本節還包括同義詞差別觀作用觀兩種共為七種觀察法同義詞差別觀指按通常的語源來觀察同義詞的差別作用觀作者在原注中的解釋非常簡略難於理解研究者一般認為作用觀指當用某一詞彙表述事物時觀察該詞彙從語源上講有無特定的作用按耆那教的觀點上述七種觀察法可分為兩大類實體觀樣態觀圖示如下其中第一個與習慣義觀可分別分為二種及三種注釋第一個指五種觀察法中的第一個無差別觀如注解圖示無差別觀可分成以個體為主及以總體為主兩種而習慣義觀可分成習慣義觀同義詞差別觀及作用觀三種故白衣派刊本之所以在中未提同義詞差別觀與作用觀這兩種觀察法是因為已經把它們包括在習慣義觀中了第二章命的真實狀態可分業的抑制狀態業的滅盡狀態混合狀態業的活動狀態及自然狀態注釋從本章到第四章主要論述七諦之第一諦命耆那教認為命依據它與行為的結果業的結合情況不同而處於各種不同的狀態中一般分如下五種業的抑制狀態此時纏繞命的業處於不活動的靜止狀態業的滅盡狀態此時業已被消滅混合狀態即此時業的抑制狀態與業的滅盡狀態正相互混合亦即處在業正趨向於滅盡的狀態此時亦稱業的活動狀態此時業正處於積極活動的狀態自然狀態此時的命與業沒有任何關聯即命顯現回歸其本源狀態順次有二種九種十八種二十一種三種的區別注釋本節意為命的上述五種狀態每種還可細分為若干種情況即業的抑制狀態可分為二種業的滅盡狀態可分成九種等等從至即詳論命的這五種狀態的分類在業的抑制狀態可分為正與行兩種注釋正即正智行即正行本節意為業如果被抑制則精神上就可以顯現正智正行有的研究者認為正包括正見正智所以業如果能被抑制則正見正智正行三寶俱可顯現在業的滅盡狀態再加上智見施與利得受用皆用精進注釋前一節的正行再加上本節的智等七種即為九種業的滅盡狀態智即正智本節中的正智與前一節中的正智不同前一節的正智是指業被抑制後剛開始逐漸顯現的正智而這兒的正智是指業滅盡後呈現出的完美狀態的正智見指正見有些注釋者認為上一節中的正已包括了正見他們認為上一節所講的正見指業被抑制後剛開始逐漸顯現的正見本節所講的正見則是指業滅盡後顯現出的完美狀態的正見施與這裡是指把無畏施與人使人勇敢不懼亦即佛教中所謂的施無畏利得因業滅盡而得完全智的人即使不吃飯也能生存因在其身體中有一種能同化外界物質而為己用的力量相當於中國所説的辟穀也可簡單地解釋為可得到無限的利益受用能得到天雨花之類的供養皆用能隨意幻生寶座天蓋等物並享用它們精進在佛教中此詞意為不斷地努力但在耆那教中此處意為無限的力量在業的抑制與滅盡的混合狀態可分四種智三種無智三種見五種得正行禁戒與無禁戒等十八種注釋四種智指提到的五種智中的前四種三種無智指提到的處於謬誤狀態的感官智聖典智直觀智三種見指眼見非眼見直觀智見所謂眼見指以眼識為媒介而産生的表象所謂非眼見指由眼識以外的其它五識為媒介而産生的觀念所謂直觀智見指由直觀智産生的信念五種得即前一節中所講的施與利得受用皆用精進但人在業的抑制與滅盡的混合狀態所具有的這五種得要比人在業的滅盡狀態所具有的這五種得能力要差一些正行同但此時的正行不如前者純粹禁戒與無禁戒意為應遵守部分戒律禁戒原義為自我控制或感官控制轉化為有關控制自我及感官的戒律可參見第七章在業的活動狀態則分四趣四濁三相一邪見一無智一無禁戒一不成之性及六彩等二十一種注釋四趣指地獄傍生畜生人天等衆生輪回的四個處所可與奧義書中説的三道及佛教説的六道相參照四濁指忿慢欺貪等四種感情三相指陽性陰性中性等三種性別邪見指錯誤的觀點或信仰無智指沒有智慧無禁戒指不守禁戒不成之性空衣派刊本作不成指不能圓滿完成不能解脫六彩指可根據道德的高下把人分成六種不同的類型在本然狀態則分命性可能性及不可能性等注釋命性在此指具有活力活性精神性靈性可能性指可能得到解脫的性質不可能性指不可能解脫的性質本節意為生命具有這麼三種基本性質關於不可能性可與佛教所謂斷絶善根的説法相參照在空衣派的刊本中無最後的等字但據作者原注這兒的等還包括有存在性個別性作者性等意義命的特徵是意向性注釋本節及下一節論述命的特徵意向性是耆那教的專門術語指在生命現象中存在著的廣義的精神作用它表現為針對某個目標而産生的精神活動很難確切翻譯可參見此中有兩種且分別有八種四種之區別注釋意向性可分成兩種一關於智的意向性二關於見的意向性關於智的意向性可分八種即提到的五種正智及提到的三種顛倒智關於見的意向性可分四種眼見非眼見直觀智見完全智見參見命分為二種輪回者與解脫者注釋耆那教的命可總括為解脫者與輪回者兩種所謂解脫者即已經從業的束縛中解脫出來的命可參見第十章的有關論述所謂輪回者即正在輪回中的命從下一節開始到綜述了輪回中的命的一般情況第三第四章又分別論述了在地獄地面天界等三界中輪回著的命的情況輪回者分為有意者與無意者注釋意指意識有意者指具有意識理性判斷力者無意者指不具有意識理性判斷力者輪回者並可分為動者與不動者不動者為地水植物動者為火風及具有二個以上根者注釋根即感官關於根的詳細論述可見至耆那教用根的多少作為對生物分類的標準詳見至耆那教認為植物乃至地水火風中都寓有命都是生物這種物活論的思想是值得注意的在空衣派的刊本中兩節略有不同不動者為地水火風植物動者為具有兩個以上根者即空衣派把火風都歸入不動者的範疇根有五種注釋參見可分兩類根自體與輔助根為實體根功能的獲得與意向性為作用根注釋從到本節講根的結構方式耆那教從體用兩個方面去考察根認為根可分成實體根和作用根這種思維方式值得注意以眼根為例耆那教認為瞳孔是根自體眼瞼等是輔助根兩者均有實體稱為實體根眼睛具備一種可以看見外物的能力這種能力使眼睛看到外物這就是功能的獲得為了看某一事物而顯現出的精神活動則屬意向性後兩者均沒有實體稱為作用根按照耆那教哲學的一般觀念根屬於色法即為物質性的存在而本節所講的功能的獲得與意向性實際都是精神性活動但耆那教認為這些精神性活動也都是根屬於色法這是值得注意的佛教也有類似的觀點意向性存在於觸覺等中注釋據作者原注此節意為感官智的意向性存在於觸覺等感覺中這一節的內容與上下文不甚連貫空衣派刊本無此節而以下一節為自己的節故從起空衣白衣兩派的刊本的編號逐次差一節直至至身舌鼻眼耳為五根它們的對象是觸味香色聲注釋這兩節論述根的分類及認識對象由於把根分作身舌鼻眼耳是印度比較普遍的方法故本經對此未作詳論非根的對象是聖典智注釋非根即意見因為聖典智的概念祇有意識才能理解把握故它是非根的對象但同時必須注意所述聖典智必須以感官智為基礎即非根必須在根的幫助下才能認識聖典智而不能單槍匹馬去進行認識活動直至風的諸生物有一個根注釋此節意為從地到風即地水植物火風等五類東西都是具備一個根的生物這裡所謂的直至風是指兩節所排列的次序耆那教認為這些生物具備的那個根是身或稱皮即具備觸覺空衣派的刊本此節為直至植物的生物有一個根這兒所謂的直至植物是按照空衣派刊本的排列次序來講的故也同樣是説地水火風植物等五類東西具備觸覺兩者表述方式雖不同理論內容是一致的參見蟲類蟻類蜂類人類等依次增加一個根注釋耆那教認為蟲類有兩個根皮舌蟻類有三個根皮鼻舌蜂類有四個根皮舌鼻眼而人類五根齊備皮舌鼻眼耳祇有有理性者有意識注釋耆那教認為有些人具備各種正常的精神活動思維功能這些人是有理性者而另一些人如瘋子沒有正常的精神活動思維功能是無理性者祇有有理性者才有意識無理性者沒有意識現把白衣派空衣派關於命的輪回者的生物分類圖示如下上為白衣派的分類上為空衣派的分類在趣的分離處有業身在活動注釋趣即四趣趣的分離處即一個趣與另一個趣的結合部或從一個趣到另一個趣的轉折處業身此處原文為業但實際指業身關於業身可參見至的有關內容本節意為生物死後在命從一個趣趨向另一個趣的輪回過程中祇有業身作為聯係前後生的主體在活動在起作用在推進這一過程運動是沿直線進行的注釋從本節到論述命的運動方式所需時間及命的營養物等問題本節指命沿直線運動不能繞曲線行進解脫的命的運動不曲折而輪回著的命有少於四次的方向上的曲折注釋命在運動時必須沿直線前進不能繞曲線正在輪回的命為了改變運動的方向以進入新的趣可以在某一點曲折但曲折後仍必須沿直線前進且這種曲折不能超過三次解脫了輪回的命不會有曲折它直線升入天穹不曲折祇要一瞬間注釋耆那教認為命從一點到另一點祇要是直線前進則無論距離有多遠都祇需一瞬間所以一瞬間就是命從一點直線運動到另一點所需的時間如果命在運動中發生曲折則立即進入另一瞬間因此由於解脫的命不曲折故祇需一瞬間就可以直線上升到天穹輪回的命最多曲折三次因此它最遲在第四瞬間進入新的趣得到新的身體與生命形態一瞬間二瞬間三瞬間時命不攝取注釋由於此時的命正在為進入新趣而運動本身沒有肉體故它不需攝取其它物質作自己的營養物白衣派刊本無三瞬間一詞據空衣派刊本補命的出生形式有凝集生胎生化生三種注釋命本身是無始無終的它既不會被産生也不會被消滅但是由於業力作用它可以輪回於四趣本節至論述命在輪回的過程中以怎樣的形式出生到某一趣耆那教主張的凝集生胎生化生與婆羅門教主張的卵生胎生濕生芽生佛教主張的卵生胎生濕生化生可相參照其出生的場所分別為諸有生命處冷處覆處與其相反處及混合處注釋生於諸有生命處指生在生物體的內部如蛔蟲生在腸道中生於冷處指某些生物嗜冷生於寒冷的地方生於覆處指陰暗的地方如某些生於腐敗樹葉堆中的菌類等生於與其相反處指與上述三處相反的地方即非生命處如桌子中的蛀蟲暖處明處生於混合處指有生命無生命的混合處冷暖並存處明覆相兼處等胎生是胞衣生卵生和無膜生注釋胞衣生該詞在佛教中譯為胎生指哺乳動物的産育方式但在耆那教中指出生時幼體外有胞衣故與佛教的胎生還有所不同卵生指由卵孵化而生無膜生耆那教認為獅子等野獸雖是胎生但幼崽出生時外無胞衣故稱無膜生在空衣派的刊本中本節作意義相同化生是地獄與天注釋化生指不需要任何母體突然幻現的生命産生形式據説生活在地獄及天界的命都是以這種形式産生的在空衣派的刊本中本節作意義相同其餘是凝集生注釋凝集生類似於佛教的濕生即濕氣凝集而生如蚊蚋等另外身體有粗大身可變身取得身光亮身業身等五種注釋本節至論述命在輪回時在各趣各具有什麼樣的身體形態粗大身指通常所謂的肉體可變身指在天界地獄中的鬼神所具有的可以任意幻化的身體取得身聖人産生疑問時可由頭頂産生取得身該身可雲遊各處取得正智光亮身由火原子構成在一般人處它表現為可消化食物的熱力而在苦行者處它可作為一種能燒毀他物的力量而顯現出來業身由物質性的業構成起輪回主體的作用此五身後面的更細微一些注釋本節意為組成這五身的物質愈往後愈細微後兩節即具體解釋本節光亮身以前的各身所擁有的微點後者依次比前多無數倍注釋光亮身以前的各身指粗大身可變身取得身三種微點這是耆那教特有的術語指物質性的原子原子可以相互結合成復合體復合體的質料要粗於原子其它的具有的微點依次是前者的無數倍注釋其它的指光亮身業身兩節意為由於組成肉體身等五身的物質逐漸由原子的復合體分解為更細小的原子微點所以它微點的數目愈來愈多從而組成身體的物質也就愈來愈細微最後兩身活動時不受任何障礙注釋前三個身由於質料粗在活動時可能會被其它物體阻擋如牆壁可以擋住肉體身等但光亮身業身的質料極其細微像小砂粒穿透篩子一樣沒有任何東西可以阻擋它們的活動佛教也有類似的説法且無始以來即與命相結合故光亮身及業身存在於一切生物之中注釋耆那教認為一個命祇要墮入輪回光亮身業身就開始與它結合祇要命繼續輪回下去這種結合是不會解脫的故此説這二身存在於一切輪回著的生物之中一個命以這